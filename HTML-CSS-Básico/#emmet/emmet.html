<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstração Emmet - Formulário de Tarefas</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1e1e2e; color: #cdd6f4; }
        .container { max-width: 400px; background: #313244; padding: 20px; border-radius: 8px; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #89b4fa; color: #11111b; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <div class="container">
        <form id="form-nova-tarefa">
            <h2>Adicionar Tarefa</h2>
            <div class="campo">
                <label for="titulo">Título:</label>
                <input type="text" name="titulo" id="titulo" required>
            </div>
            <button type="submit" class="btn-salvar">Salvar Tarefa</button>
        </form>
    </div>

    <script>
        // BÔNUS: Como esse HTML gerado magicamente se conecta com a sua API Python
        document.getElementById('form-nova-tarefa').addEventListener('submit', async function(event) {
            event.preventDefault(); // Evita que a página recarregue
            
            const titulo = document.getElementById('titulo').value;
            
            console.log("Enviando para o backend (ex: FastAPI)...");
            console.log("Dados:", JSON.stringify({ titulo: titulo, concluida: false }));

            // Aqui você usaria o fetch() para enviar o POST para o seu backend.
            /*
            await fetch('http://localhost:8000/tarefas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo: titulo })
            });
            */
            
            alert(`Tarefa "${titulo}" pronta para ser enviada para a API!`);
        });
    </script>
</body>
</html>

div.container>form#form-nova-tarefa>h2{Adicionar Tarefa}+div.campo>label[for="titulo"]{Título:}+input#titulo[name="titulo" type="text" required]^^button.btn-salvar[type="submit"]{Salvar Tarefa}
